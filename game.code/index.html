<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>AI Ethics Card Game</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						fontFamily: {
							sans: ["IBM Plex Sans", "ui-sans-serif", "system-ui"],
							display: ["Space Grotesk", "ui-sans-serif", "system-ui"],
						},
					},
				},
			};
		</script>
		<style>
			h1,
			h2,
			h3 {
				font-family: "Space Grotesk", ui-sans-serif, system-ui;
			}

			* {
				scrollbar-width: thin;
				scrollbar-color: rgba(148, 163, 184, 0.5) rgba(15, 23, 42, 0.5);
			}

			*::-webkit-scrollbar {
				width: 10px;
			}

			*::-webkit-scrollbar-track {
				background: rgba(15, 23, 42, 0.4);
			}

			*::-webkit-scrollbar-thumb {
				background: rgba(148, 163, 184, 0.5);
				border-radius: 9999px;
			}
		</style>
	</head>
	<body class="bg-slate-950">
		<div id="app"></div>
		<script type="module" src="./app.js"></script>
	</body>
</html>
